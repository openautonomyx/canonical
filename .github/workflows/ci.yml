name: canonical-ci

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  rust:
    name: Rust build, test, and delivery loop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Generate lockfile if missing
        run: cargo generate-lockfile

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Run canonical edge loop
        run: |
          cargo run -p edge-cli -- run \
            --task examples/tasks/basic-task.json \
            --workspace .canonical/session.jsonl

      - name: Replay workspace
        run: |
          cargo run -p edge-cli -- replay \
            --workspace .canonical/session.jsonl

      - name: Validate workspace
        run: |
          cargo run -p edge-cli -- validate \
            --workspace .canonical/session.jsonl

      - name: Generate report
        run: |
          cargo run -p edge-cli -- report \
            --workspace .canonical/session.jsonl \
            --out reports/out/canonical-edge-report.md

      - name: Assert artifacts
        run: |
          test -s .canonical/session.jsonl
          test -s reports/out/canonical-edge-report.md

  rust-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit

  javascript:
    name: JS SDK build and audit
    runs-on: ubuntu-latest
    if: ${{ hashFiles('sdk/js/package.json') != '' }}
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk/js/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=high

  go:
    name: Go SDK test
    runs-on: ubuntu-latest
    if: ${{ hashFiles('sdk/go/canonical/go.mod') != '' }}
    defaults:
      run:
        working-directory: sdk/go/canonical
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: sdk/go/canonical/go.sum

      - name: Test
        run: go test ./...

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
